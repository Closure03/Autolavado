# .github/workflows/gcp-frontend-deploy.yml
# Deploy automático del frontend estático → Google Cloud Storage
# Se ejecuta en cada push a main que modifique archivos del frontend

name: Deploy Frontend → Cloud Storage

on:
  push:
    branches:
      - main
    paths:
      - 'backend/frontend/**'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  BUCKET_NAME: autolavado-frontend

jobs:
  deploy-frontend:
    name: Upload to Cloud Storage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Autenticación con GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Configurar gcloud
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Subir archivos al bucket
      # ⚠️ Los archivos se suben desde backend/frontend/
      - name: Upload frontend files to Cloud Storage
        run: |
          gsutil -m cp -r backend/frontend/* gs://${{ env.BUCKET_NAME }}/

      # 5. Verificar que index.html es accesible
      - name: Verify deployment
        run: |
          URL="https://storage.googleapis.com/${{ env.BUCKET_NAME }}/index.html"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend desplegado en: $URL"
          else
            echo "⚠️  Status HTTP: $STATUS — verificar configuración del bucket"
          fi
