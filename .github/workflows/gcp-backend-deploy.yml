# .github/workflows/gcp-backend-deploy.yml
# Deploy automático del backend FastAPI → Google Cloud Run
# Se ejecuta en cada push a main que modifique archivos del backend

name: Deploy Backend → Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/**'
      - 'backend/requirements.txt'
      - 'backend/Dockerfile'
  workflow_dispatch:   # Permite ejecución manual desde GitHub UI

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: autolavado-api
  REGISTRY: us-central1-docker.pkg.dev
  REPO: autolavado

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Requerido para Workload Identity Federation

    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Autenticación con GCP usando Service Account Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Configurar gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Configurar Docker para Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # 5. Build de la imagen Docker
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest \
            ./backend

      # 6. Push al Artifact Registry
      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest

      # 7. Deploy a Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:autolavado-db \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --port 8080 \
            --quiet

      # 8. Obtener y mostrar la URL del servicio
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "✅ Backend desplegado en: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      # 9. Verificar health check
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.SERVICE_URL }}/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check OK (HTTP $STATUS)"
          else
            echo "❌ Health check FAILED (HTTP $STATUS)"
            exit 1
          fi
