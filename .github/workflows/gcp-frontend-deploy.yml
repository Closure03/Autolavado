# .github/workflows/gcp-frontend-deploy.yml
# Deploy automático del frontend → Google Cloud Storage
# Se activa en cada push a master que modifique archivos del frontend

name: Deploy Frontend → Cloud Storage

on:
  push:
    branches: [master]
    paths:
      - 'backend/frontend/**'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  # Nombre real del bucket — debe coincidir con el bucket ya creado
  BUCKET_NAME: autolavado-frontend-robust-carver-494005-v6

jobs:
  deploy:
    name: Upload to Cloud Storage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload frontend to Cloud Storage
        run: |
          gsutil -m cp -r backend/frontend/* gs://${{ env.BUCKET_NAME }}/

      - name: Verify deployment
        run: |
          URL="https://storage.googleapis.com/${{ env.BUCKET_NAME }}/index.html"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "Frontend URL: $URL"
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Frontend desplegado correctamente" || echo "⚠️ Verificar acceso público del bucket"